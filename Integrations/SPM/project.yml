name: PagePilot
options:
  bundleIdPrefix: org.readium
  schemePathPrefix: ../../../
fileGroups:
  - PagePilot.storekit
packages:
  Readium:
    url: https://github.com/readium/swift-toolkit.git
    VERSION
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.9.23
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 5.15.8
  MBProgressHUD:
    url: https://github.com/jdg/MBProgressHUD.git
    from: 1.2.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.3.2
schemes:
  PagePilot:
    build:
      targets:
        PagePilot: all
        PagePilotTests: [test]
    test:
      targets:
        - PagePilotTests
    run:
      storeKitConfiguration: PagePilot.storekit
targets:
  PagePilot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iPhone
      - path: Sources
        excludes:
          - Resources/Fonts
      - path: Sources/Resources/Fonts
        type: folder
      - path: Shared
    dependencies:
      - target: PagePilotWatch
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      - package: Readium
        product: ReadiumAdapterGCDWebServer
      - package: Readium
        product: ReadiumOPDS
      - package: Readium
        product: ReadiumLCP
      - package: GRDB
      - package: Kingfisher
      - package: MBProgressHUD
      - package: SwiftSoup
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilot
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}
      CODE_SIGN_ENTITLEMENTS: iPhone/pagepilot.entitlements
    entitlements:
      path: iPhone/pagepilot.entitlements

  PagePilotWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchRemote
      - path: Shared
    settings:
      INFOPLIST_FILE: WatchRemote/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilot.WatchRemote
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}

  PagePilotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: PagePilot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilotTests
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}
