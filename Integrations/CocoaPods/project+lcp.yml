name: PagePilot
options:
  bundleIdPrefix: org.readium
targets:
  PagePilot:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iPhone
      - path: Sources
        excludes:
          - Resources/Fonts
      - path: Sources/Resources/Fonts
        type: folder
      - path: Shared
    dependencies:
      - target: PagePilotWatch
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilot
      OTHER_SWIFT_FLAGS: $(inherited) -DLCP
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}

  PagePilotWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchRemote
      - path: Shared
    settings:
      INFOPLIST_FILE: WatchRemote/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilot.WatchRemote
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}
