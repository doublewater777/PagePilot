name: PagePilot
options:
  bundleIdPrefix: org.readium
packages:
  Readium:
    path: ..
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.9.23
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 5.15.8
  MBProgressHUD:
    url: https://github.com/jdg/MBProgressHUD.git
    from: 1.2.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.3.2
schemes:
  PagePilot:
    build:
      targets:
        PagePilot: none
    test:
      testPlans:
        - path: PagePilot.xctestplan
          defaultPlan: true
targets:
  PagePilot:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iPhone
      - path: Sources
        excludes:
          - Resources/Fonts
      - path: Sources/Resources/Fonts
        type: folder
      - path: Shared
    dependencies:
      - target: PagePilotWatch
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      - package: Readium
        product: ReadiumAdapterGCDWebServer
      - package: Readium
        product: ReadiumOPDS
      - package: Readium
        product: ReadiumLCP
      - package: GRDB
      - package: Kingfisher
      - package: MBProgressHUD
      - package: SwiftSoup
    settings:
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}

  PagePilotWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchRemote
      - path: Shared
    settings:
      INFOPLIST_FILE: WatchRemote/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.panyang.PagePilot.WatchRemote
      DEVELOPMENT_TEAM: ${RD_DEVELOPMENT_TEAM}
